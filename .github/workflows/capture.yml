name: Capture Frame

on:
  schedule:
    - cron: '*/15 * * * *'   # 每15分钟抓一帧
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Grab frames for all streams
        run: |
          set +e   # 单个源失败不要中断整个脚本，继续抓其他源
          DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          TIME=$(TZ='Asia/Shanghai' date +%H%M%S)

          declare -A STREAMS=(
            [laoshan]="http://play.zhihuiwenlvyun.com/live/chaoyinpu2026.m3u8"
            [lingqifeng]="http://play.zhihuiwenlvyun.com/live/lingqifeng2026.m3u8"
            [qtv1]="https://hlspull.qtv.com.cn/v31faxcg/channel/dba5f5df47dc14a9b08385b1c22faadf/1.m3u8"
            [qtv2]="https://hlspull.qtv.com.cn/v31faxcg/channel/51d10523f0a1fdcda5c4223babe1682c/1.m3u8"
          )

          for name in "${!STREAMS[@]}"; do
            url="${STREAMS[$name]}"
            mkdir -p "frames/$name/$DATE"
            echo "=== Capturing $name ==="
            ffmpeg -y -user_agent "Mozilla/5.0" \
                   -timeout 15000000 \
                   -i "$url" \
                   -frames:v 1 \
                   "frames/$name/$DATE/$TIME.jpg"
            if [ $? -ne 0 ]; then
              echo "!!! $name failed, removing empty/broken file if any"
              rm -f "frames/$name/$DATE/$TIME.jpg"
            fi
          done

      - name: Commit all frames in one push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add frames/
          git commit -m "add frames $(TZ='Asia/Shanghai' date)" || echo "no change to commit"
          git pull --rebase origin main || true
          git push
