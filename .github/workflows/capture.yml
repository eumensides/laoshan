name: Capture Frame

on:
  schedule:
    - cron: '*/5 * * * *'   # 每5分钟抓一帧，可自行调整间隔
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Grab a frame
        run: |
          mkdir -p frames/$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          ffmpeg -y -user_agent "Mozilla/5.0" \
                 -i "http://play.zhihuiwenlvyun.com/live/chaoyinpu2026.m3u8" \
                 -frames:v 1 \
                 "frames/$(TZ='Asia/Shanghai' date +%Y-%m-%d)/$(TZ='Asia/Shanghai' date +%H%M%S).jpg"

      - name: Commit frame
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add frames/
          git commit -m "add frame $(TZ='Asia/Shanghai' date)" || echo "no change"
          git push
