name: 图片自动压缩为WebP（CDN加速用）

on:
  push:
    paths:
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.JPG'
      - '**.PNG'
      - '**.JPEG'
  workflow_dispatch:

jobs:
  convert-to-webp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 webp 工具
        run: sudo apt-get update -qq && sudo apt-get install -y -qq webp

      - name: 批量转换为压缩 WebP
        run: |
          count=0
          # 遍历仓库中所有 png/jpg/jpeg（忽略 .git 目录）
          find . -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) ! -path "./.git/*" | while read -r img; do
            webp_path="${img%.*}.webp"

            # 原图更新过，或还没生成对应 webp 时才转换，避免重复浪费时间
            if [ ! -f "$webp_path" ] || [ "$img" -nt "$webp_path" ]; then
              # -q 80：压缩质量（0-100，数值越低体积越小画质越差，可按需调整）
              # -mt：多线程加速
              if cwebp -q 80 -mt "$img" -o "$webp_path" >/dev/null 2>&1; then
                echo "✓ 已生成: $webp_path"
                count=$((count+1))
              else
                echo "✗ 转换失败: $img"
              fi
            else
              echo "— 已是最新: $webp_path"
            fi
          done
          echo "本次共处理 $count 张图片"

      - name: 提交修改
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "*.webp"
          if git diff --cached --quiet; then
            echo "没有需要提交的修改"
          else
            git commit -m "🖼️ 自动生成压缩 WebP 图片"
            git push
          fi
