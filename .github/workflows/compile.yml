name: Compile Timelapse

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = 北京时间次日早 6:00
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build timelapses for yesterday
        run: |
          set +e
          DAY=$(TZ='Asia/Shanghai' date -d "yesterday" +%Y-%m-%d)
          echo "DAY=$DAY" >> $GITHUB_ENV

          declare -A LABELS=(
            [shizifeng]="狮子峰"
            [chaoyinpu]="潮音瀑"
            [taiqingwan]="太清湾"
            [jufengxiazhan]="巨峰下站"
            [shouzifeng]="寿字峰"
            [lingqifeng]="灵旗峰"
            [erlongshan]="二龙山"
            [huayanshijie]="华严世界"
            [wusiguangchang]="五四广场"
            [yinchuanxilu]="银川西路"
            [fuzhoulu]="福州路"
            [nanjinglu]="南京路"
            [aofanzhongxin]="奥帆中心"
          )

          for name in "${!LABELS[@]}"; do
            DIR="frames/$name/$DAY"
            if [ -d "$DIR" ] && [ "$(ls -A "$DIR")" ]; then
              echo "=== Compiling $name (MP4) ==="
              # -framerate 1：每张原图停留1秒
              # -r 24：用24fps封装（把每张图复制成24帧），保证各播放器兼容且时长稳定
              ffmpeg -y -framerate 1 \
                     -pattern_type glob -i "$DIR/*.jpg" \
                     -r 24 \
                     -c:v libx264 -pix_fmt yuv420p \
                     "timelapse-$name-$DAY.mp4"

              echo "=== Compiling $name (GIF) ==="
              # 同样每张1秒；缩到640宽 + 生成调色板，控制GIF文件大小和画质
              ffmpeg -y -framerate 1 \
                     -pattern_type glob -i "$DIR/*.jpg" \
                     -vf "fps=1,scale=640:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse" \
                     -loop 0 \
                     "timelapse-$name-$DAY.gif"

              echo "${name}_SUCCESS=true" >> $GITHUB_ENV
            else
              echo "=== No data for $name on $DAY, skipping ==="
              echo "${name}_SUCCESS=false" >> $GITHUB_ENV
            fi
          done

      - name: Upload releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          declare -A LABELS=(
            [shizifeng]="狮子峰" [chaoyinpu]="潮音瀑" [taiqingwan]="太清湾"
            [jufengxiazhan]="巨峰下站" [shouzifeng]="寿字峰" [lingqifeng]="灵旗峰"
            [erlongshan]="二龙山" [huayanshijie]="华严世界" [wusiguangchang]="五四广场"
            [yinchuanxilu]="银川西路" [fuzhoulu]="福州路" [nanjinglu]="南京路"
            [aofanzhongxin]="奥帆中心"
          )
          for name in "${!LABELS[@]}"; do
            var="${name}_SUCCESS"
            if [ "${!var}" == "true" ]; then
              gh release create "timelapse-$name-$DAY" "timelapse-$name-$DAY.mp4" "timelapse-$name-$DAY.gif" \
                --title "${LABELS[$name]} $DAY" \
                --notes "自动生成的延时视频（含MP4和GIF两种格式）" \
                || echo "!!! release upload failed for $name"
            fi
          done

      - name: Send emails
        if: always()
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          set +e
          declare -A LABELS=(
            [shizifeng]="狮子峰" [chaoyinpu]="潮音瀑" [taiqingwan]="太清湾"
            [jufengxiazhan]="巨峰下站" [shouzifeng]="寿字峰" [lingqifeng]="灵旗峰"
            [erlongshan]="二龙山" [huayanshijie]="华严世界" [wusiguangchang]="五四广场"
            [yinchuanxilu]="银川西路" [fuzhoulu]="福州路" [nanjinglu]="南京路"
            [aofanzhongxin]="奥帆中心"
          )

          # send_mail.py 以 base64 编码嵌入，避免复制粘贴时破坏 Python 缩进
          echo '' | base64 -d > send_mail.py

          # 校验一下脚本语法是否正确，不正确直接报错终止（避免像之前那样静默失败13次）
          python3 -m py_compile send_mail.py
          if [ $? -ne 0 ]; then
            echo "!!! send_mail.py 语法有误，中止发送邮件"
            exit 1
          fi

          for name in "${!LABELS[@]}"; do
            var="${name}_SUCCESS"
            if [ "${!var}" == "true" ]; then
              python3 send_mail.py "$name" "${LABELS[$name]}" "$DAY" "timelapse-$name-$DAY.mp4" "timelapse-$name-$DAY.gif" \
                || echo "!!! email failed for $name"
            fi
          done

      - name: Clean up frames older than 7 days
        run: |
          CUTOFF=$(TZ='Asia/Shanghai' date -d "7 days ago" +%Y-%m-%d)
          for stream_dir in frames/*/; do
            for date_dir in "$stream_dir"*/; do
              folder_date=$(basename "$date_dir")
              if [[ "$folder_date" < "$CUTOFF" ]]; then
                echo "Removing $date_dir"
                git rm -rq "$date_dir" || rm -rf "$date_dir"
              fi
            done
          done
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A frames/
          git commit -m "cleanup frames older than 7 days" || echo "nothing to clean"
          git pull --rebase origin main || true
          git push
